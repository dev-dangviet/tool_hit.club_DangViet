<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>AI Tài Xỉu · Siêu Phân Tích Cầu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #03000b;
      background-image: radial-gradient(circle at 25% 20%, rgba(0, 180, 255, 0.15) 0%, transparent 55%),
                        radial-gradient(circle at 75% 65%, rgba(180, 0, 255, 0.2) 0%, transparent 55%),
                        radial-gradient(circle at 50% 90%, rgba(255, 200, 0, 0.1) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 1.2rem;
      margin: 0;
      position: relative;
    }

    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 40% 30%, rgba(0, 212, 255, 0.12), transparent 55%),
                  radial-gradient(circle at 70% 70%, rgba(180, 0, 255, 0.18), transparent 55%),
                  radial-gradient(circle at 20% 80%, rgba(255, 200, 0, 0.08), transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .glass-card {
      background: rgba(8, 8, 28, 0.5);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 2.4rem;
      padding: 1.8rem 1.6rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 0 25px rgba(255, 255, 255, 0.04);
      transition: all 0.35s ease;
    }

    .glass-card:hover {
      border-color: rgba(0, 212, 255, 0.45);
      box-shadow: 0 35px 60px rgba(0, 0, 0, 0.8), inset 0 0 35px rgba(0, 212, 255, 0.15);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .logo-icon {
      font-size: 2.3rem;
      filter: drop-shadow(0 0 14px #00d4ff);
    }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      font-size: 1.7rem;
      background: linear-gradient(135deg, #00d4ff, #b76eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .status-badge {
      background: rgba(0, 255, 200, 0.08);
      border: 1px solid rgba(0, 255, 200, 0.45);
      border-radius: 3rem;
      padding: 0.5rem 1.6rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #00ffcc;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(6px);
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      background: #00ffcc;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
      box-shadow: 0 0 10px #00ffcc;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(0, 255, 200, 0.9);
      }
      70% {
        box-shadow: 0 0 0 14px rgba(0, 255, 200, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(0, 255, 200, 0);
      }
    }

    .session-info {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .phiên-badge {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.7rem;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .time-text {
      color: #a0a0b0;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
    }

    .result-tag {
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      font-size: 3rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      line-height: 1;
    }

    .result-tag.tài {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .result-tag.xỉu {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .dice-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1.6rem 0;
    }

    .dice {
      width: 85px;
      height: 85px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 3.2rem;
      color: white;
      text-shadow: 0 0 22px rgba(255, 255, 255, 0.65);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
      transition: all 0.25s;
    }

    .dice:hover {
      transform: scale(1.06);
      border-color: #00d4ff;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.45);
    }

    .total-sum {
      text-align: center;
      font-size: 1.1rem;
      color: #ccc;
      margin-bottom: 0.8rem;
    }

    .total-num {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 2.4rem;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: #c0c0e0;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
    }

    .section-title i {
      font-style: normal;
      font-size: 1.4rem;
    }

    .cầu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-bottom: 1.2rem;
      min-height: 2.5rem;
      align-items: center;
    }

    .cầu-badge {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2rem;
      padding: 0.5rem 1.4rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #e0e0f0;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }

    .no-pattern {
      color: #888;
      font-style: italic;
    }

    .prediction-box {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 1.5rem;
      padding: 1.5rem;
      text-align: center;
      margin-top: 0.4rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .prediction-label {
      font-size: 0.85rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 0.4rem;
    }

    .prediction-result {
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      font-size: 3.2rem;
      margin: 0.3rem 0;
      letter-spacing: 2px;
    }

    .prediction-result.tài {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .prediction-result.xỉu {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .prediction-result.chờ {
      color: #f1c40f;
      background: none;
      -webkit-text-fill-color: #f1c40f;
    }

    .confidence-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      margin: 0.8rem 0;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ffcc, #00d4ff);
      border-radius: 6px;
      width: 0%;
      transition: width 0.5s ease;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
    }

    .detail-text {
      font-size: 0.9rem;
      color: #ccc;
      margin-top: 0.3rem;
    }

    .accuracy-box {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin: 1.2rem 0 0.5rem;
    }

    .accuracy-item {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
    }

    .accuracy-value {
      font-size: 2rem;
      font-weight: 700;
    }

    .accuracy-label {
      font-size: 0.7rem;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .btn-refresh {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 3rem;
      padding: 0.8rem 2rem;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
      backdrop-filter: blur(10px);
      letter-spacing: 0.4px;
    }

    .btn-refresh:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.6);
      box-shadow: 0 0 22px rgba(0, 212, 255, 0.35);
      transform: translateY(-1px);
    }

    .history-table,
    .prediction-history-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.8rem;
    }

    .history-table th,
    .prediction-history-table th {
      text-align: left;
      color: #aaa;
      font-weight: 500;
      font-size: 0.8rem;
      padding-bottom: 0.7rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .history-table td,
    .prediction-history-table td {
      padding: 0.8rem 0;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #ddd;
    }

    .table-result {
      font-weight: 700;
    }

    .table-result.tài {
      color: #ff6b6b;
    }

    .table-result.xỉu {
      color: #4ecdc4;
    }

    .correct {
      color: #2ecc71;
      font-weight: 700;
    }

    .wrong {
      color: #e74c3c;
      font-weight: 700;
    }

    .pending {
      color: #f1c40f;
      font-weight: 600;
    }
    @media (max-width: 550px) {
      .glass-card {
        padding: 1.2rem 1rem;
      }
      .dice {
        width: 65px;
        height: 65px;
        font-size: 2.5rem;
      }
      .result-tag {
        font-size: 2.2rem;
      }
      .prediction-result {
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
  <div class="glass-card">
    <div class="header">
      <div class="logo">
        <span class="logo-icon">🎲</span>
        <span class="logo-text">DVIET × HITCLUB</span>
      </div>
      <div class="status-badge"><span class="status-dot"></span> TRỰC TUYẾN</div>
    </div>
    <div class="session-info">
      <div>
        <div class="phiên-badge" id="phiênDisplay">------</div>
        <div class="time-text" id="timeDisplay">Đang tải...</div>
      </div>
      <div class="result-tag" id="resultDisplay">--</div>
    </div>
    <div class="dice-row">
      <div class="dice" id="dice1">-</div>
      <div class="dice" id="dice2">-</div>
      <div class="dice" id="dice3">-</div>
    </div>
    <div class="total-sum">Tổng: <span class="total-num" id="totalDisplay">-</span></div>
    <div style="display:flex; justify-content:flex-end; margin-top:1.2rem;">
      <button class="btn-refresh" id="refreshBtn"><span>⟳</span> Làm mới</button>
    </div>
  </div>

  <div class="glass-card">
    <div class="section-title"><span>🧠</span> PHÂN TÍCH CẦU</div>
    <div class="cầu-grid" id="cầuContainer">
      <span class="cầu-badge no-pattern">Chưa đủ dữ liệu</span>
    </div>
    <div class="prediction-box">
      <div class="prediction-label">PHIÊN HIỆN TẠI</div>
      <div class="prediction-result chờ" id="predictionResult">--</div>
      <div class="confidence-bar">
        <div class="confidence-fill" id="confidenceFill" style="width: 0%;"></div>
      </div>
      <div class="detail-text" id="predictionDetail"></div>
    </div>
    <div class="accuracy-box">
      <div class="accuracy-item">
        <div class="accuracy-value" id="totalPredictions">0</div>
        <div class="accuracy-label">Lần dự đoán</div>
      </div>
      <div class="accuracy-item">
        <div class="accuracy-value" id="correctPredictions" style="color:#2ecc71;">0</div>
        <div class="accuracy-label">Đúng</div>
      </div>
      <div class="accuracy-item">
        <div class="accuracy-value" id="accuracyRate" style="color:#f1c40f;">--%</div>
        <div class="accuracy-label">Tỉ lệ</div>
      </div>
    </div>
  </div>

  <div class="glass-card">
    <div class="section-title"><span>📊</span> LỊCH SỬ DỰ ĐOÁN</div>
    <table class="prediction-history-table">
      <thead><tr><th>Phiên</th><th>Dự đoán</th><th>Kết quả</th><th>Trạng thái</th></tr></thead>
      <tbody id="predictionHistoryBody"></tbody>
    </table>
  </div>
</div>
