<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HITCLUB PREMIUM | DANG VIET</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #020205;
            --ios-surface: rgba(22, 22, 26, 0.65);
            --ios-surface-solid: #121217;
            --ios-border: rgba(255, 255, 255, 0.07);
            --ios-accent: #0A84FF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-text-primary: #FFFFFF;
            --ios-text-secondary: rgba(255, 255, 255, 0.55);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--ios-bg);
            color: var(--ios-text-primary);
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -150px; left: -50px; width: 500px; height: 400px;
            background: radial-gradient(circle, rgba(10, 132, 255, 0.18) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .icon-key {
            width: 44px; height: 44px; margin: 0 auto 16px;
            position: relative; background: radial-gradient(circle, rgba(10, 132, 255, 0.2), transparent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .icon-key::before {
            content: ''; width: 14px; height: 14px; border: 4px solid var(--ios-accent);
            border-radius: 50%; position: absolute; top: 10px;
        }
        .icon-key::after {
            content: ''; width: 4px; height: 14px; background: var(--ios-accent);
            position: absolute; bottom: 8px; box-shadow: 4px 4px 0 var(--ios-accent);
        }

        .icon-arrow-left {
            width: 12px; height: 12px; border-left: 2.5px solid var(--ios-accent);
            border-bottom: 2.5px solid var(--ios-accent); transform: rotate(45deg);
            display: inline-block; margin-right: 6px;
        }

        .icon-more {
            display: flex; gap: 3.5px; padding: 10px 4px; cursor: pointer;
        }
        .icon-more span {
            width: 5px; height: 5px; background: var(--ios-accent); border-radius: 50%;
        }

        #keyOverlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(1, 1, 3, 0.88);
            backdrop-filter: blur(40px);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #keyOverlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .key-card {
            width: 100%; max-width: 340px;
            background: var(--ios-surface);
            border: 1px solid var(--ios-border);
            border-radius: 28px; padding: 36px 24px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .key-card h2 { font-size: 23px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
        .key-card p { font-size: 13.5px; color: var(--ios-text-secondary); margin-bottom: 28px; }
        
        .key-input {
            width: 100%; padding: 16px; border-radius: 16px;
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #fff; font-size: 17px; text-align: center; letter-spacing: 1px;
            outline: none; transition: all 0.25s ease;
        }
        .key-input:focus {
            background: rgba(255, 255, 255, 0.09);
            border-color: var(--ios-accent);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.15);
        }
        
        .key-btn {
            margin-top: 20px; padding: 16px; border-radius: 16px;
            background: var(--ios-accent); color: #fff; font-weight: 600; font-size: 16px;
            border: none; width: 100%; cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2);
        }
        .key-btn:active { transform: scale(0.97); opacity: 0.85; }
        .key-msg { margin-top: 16px; font-size: 13px; font-weight: 500; min-height: 18px;}
        .key-msg.error { color: var(--ios-red); }
        .key-msg.success { color: var(--ios-green); }

        .header {
            display: flex; align-items: center; padding: 20px 24px;
            background: rgba(2, 2, 5, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--ios-border);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            color: var(--ios-accent); text-decoration: none;
            display: flex; align-items: center; font-size: 16px; font-weight: 500;
        }
        .title { font-size: 17px; font-weight: 600; text-align: center; flex: 1; letter-spacing: -0.2px; }
        .menu-btn { background: none; border: none; cursor: pointer; }

        .menu-panel {
            position: fixed; top: 76px; right: 24px; width: 180px;
            background: rgba(22, 22, 27, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid var(--ios-border);
            border-radius: 20px; padding: 6px 0;
            display: none; flex-direction: column; z-index: 200;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .menu-panel button {
            background: none; border: none; color: #fff; padding: 14px 18px;
            text-align: left; font-size: 14.5px; font-weight: 500; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .menu-panel button:last-child { border-bottom: none; color: var(--ios-red); }
        .menu-panel button:active { background: rgba(255,255,255,0.08); }

        .main-content {
            flex: 1; display: flex; flex-direction: column; align-items: center; padding: 32px 24px;
        }
        
        .prediction-circle {
            width: 230px; height: 230px; border-radius: 50%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--ios-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 38px; position: relative;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .prediction-circle.pulse-green { 
            border-color: rgba(48, 209, 88, 0.35); 
            box-shadow: 0 0 35px rgba(48, 209, 88, 0.12), inset 0 0 20px rgba(48, 209, 88, 0.05);
        }
        .prediction-circle.pulse-red { 
            border-color: rgba(255, 69, 58, 0.35); 
            box-shadow: 0 0 35px rgba(255, 69, 58, 0.12), inset 0 0 20px rgba(255, 69, 58, 0.05);
        }

        .session-text { font-size: 11.5px; font-weight: 600; color: var(--ios-text-secondary); letter-spacing: 1.5px; margin-bottom: 3px; }
        .prediction-result { font-size: 54px; font-weight: 800; letter-spacing: -1px; text-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .confidence-text { font-size: 15px; font-weight: 600; color: var(--ios-text-secondary); margin-top: 5px; }

        .history-section { width: 100%; margin-top: 12px; }
        .history-title { font-size: 13px; font-weight: 500; color: var(--ios-text-secondary); letter-spacing: 0.3px; margin-left: 12px; margin-bottom: 10px; text-transform: uppercase;}
        
        .history-container {
            background: var(--ios-surface); border: 1px solid var(--ios-border);
            border-radius: 22px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th {
            padding: 14px; text-align: center; font-size: 12px; color: var(--ios-text-secondary); font-weight: 600;
            border-bottom: 1px solid var(--ios-border); background: rgba(255, 255, 255, 0.01);
        }
        .history-table td { padding: 15px 14px; text-align: center; font-size: 14.5px; font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .history-table tr:last-child td { border-bottom: none; }
        
        .status-win { color: var(--ios-green); font-weight: 600; }
        .status-lose { color: var(--ios-red); font-weight: 600; }
    </style>
</head>
<body>

    <!-- PHẦN NHẬP KEY -->
    <div id="keyOverlay">
        <div class="key-card">
            <div class="icon-key"></div>
            <h2>HITCLUB</h2>
            <p>NHẬP KEY ĐỂ KÍCH HOẠT TOOL</p>
            <input type="text" id="keyInput" class="key-input" placeholder="Nhập key tại đây..." maxlength="24" autocomplete="off">
            <button id="keyBtn" class="key-btn" onclick="submitKey()">Xác thực Thiết bị</button>
            <div id="keyMsg" class="key-msg"></div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <a href="#" class="back-btn" onclick="location.reload()"><span class="icon-arrow-left"></span> Trở lại</a>
        <div class="title" id="headerTitle">HITCLUB MD5</div>
        <button class="menu-btn" id="menuBtn">
            <div class="icon-more"><span></span><span></span><span></span></div>
        </button>
    </header>

    <!-- MENU -->
    <div class="menu-panel" id="menuPanel">
        <button onclick="switchTable('md5')">🎲 Bàn MD5</button>
        <button onclick="switchTable('tx')">💎 Bàn Thường</button>
        <button onclick="location.reload()">🚪 Đăng xuất</button>
    </div>

    <!-- PHÂN HIỆN KẾT QUẢ-->
    <div class="main-content" id="mainContent" style="display:none;">
        <div class="prediction-circle" id="predCircle">
            <div class="session-text">PHIÊN PHÂN TÍCH</div>
            <div style="font-size:15px; font-weight:700; color:var(--ios-accent); margin-bottom:2px;" id="phienText">#-------</div>
            <div class="prediction-result" id="duDoanText">---</div>
            <div class="confidence-text" id="doTinCayText">--%</div>
        </div>

        <div class="history-section">
            <div class="history-title">Lịch sử phân tích 10 phiên gần đây</div>
            <div class="history-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Phiên</th>
                            <th>Kết Quả</th>
                            <th>Dự Đoán</th>
                            <th>Trạng Thái</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="4" style="color:var(--ios-text-secondary); font-size:13px; padding:35px 0;">Đang thiết lập luồng dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
        let toolActive = false; 
        let currentTable = 'md5'; 
        let history = []; 
        let lastPred = null; 
        let intervalId = null;

        const MASTER_KEY = "HITCLUB_DANG_VIET";

        const API_URLS = {
            md5: 'https://hitclub-edyt.onrender.com/taixiumd5',
            tx: 'https://hitclub-edyt.onrender.com/taixiu'
        };

        function submitKey() {
            const input = document.getElementById('keyInput');
            const btn = document.getElementById('keyBtn');
            const msg = document.getElementById('keyMsg');
            const key = input.value.trim();

            if (key.length === 0) {
                msg.textContent = 'Vui lòng nhập mã bản quyền!'; 
                msg.className = 'key-msg error'; 
                return;
            }

            btn.disabled = true; 
            btn.textContent = 'Đang xác thực hệ thống...';
            msg.textContent = '';

            setTimeout(() => {
                if (key === MASTER_KEY) {
                    toolActive = true; 
                    msg.textContent = '✅ Thiết thiết bị xác thực thành công! Đang đồng bộ...'; 
                    msg.className = 'key-msg success';
                    
                    setTimeout(() => {
                        document.getElementById('keyOverlay').classList.add('hidden');
                        document.getElementById('mainContent').style.display = '';
                        startLoop(); 
                    }, 700);
                } else {
                    toolActive = false;
                    btn.disabled = false;
                    btn.textContent = 'Xác thực Thiết bị';
                    msg.textContent = '❌ Mã kích hoạt không chính xác. Vui lòng thử lại!'; 
                    msg.className = 'key-msg error';
                }
            }, 800);
        }

        document.getElementById('keyInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitKey();
        });

        async function callAPI() {
            if (!toolActive) return; 
            
            try {
                const targetUrl = API_URLS[currentTable];
                const res = await fetch(targetUrl);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                
                if (data && data.phien_hien_tai) {
                    updateUI(data);
                }
            } catch(e) {
                console.error('Lỗi thiết lập mạng API:', e);
            }
        }

        function updateUI(data) {
            let duDoanRaw = (data.du_doan || '---').toUpperCase();
            let duDoan = duDoanRaw === 'XIU' ? 'XỈU' : duDoanRaw; 
            
            let ketQuaRaw = (data.ket_qua || '---').toUpperCase();
            let ketQua = ketQuaRaw === 'XIU' ? 'XỈU' : ketQuaRaw;

            let doTinCay = currentTable === 'md5' ? (data.ty_le || '--%') : (data.confidence || '--%');

            document.getElementById('phienText').textContent = '#' + data.phien_hien_tai;
            document.getElementById('duDoanText').textContent = duDoan;
            
            const circle = document.getElementById('predCircle');
            if (duDoan === 'TÀI') {
                document.getElementById('duDoanText').style.color = 'var(--ios-green)';
                circle.className = 'prediction-circle pulse-green';
            } else if (duDoan === 'XỈU') {
                document.getElementById('duDoanText').style.color = 'var(--ios-red)';
                circle.className = 'prediction-circle pulse-red';
            } else {
                document.getElementById('duDoanText').style.color = 'var(--ios-text-primary)';
                circle.className = 'prediction-circle';
            }
            
            document.getElementById('doTinCayText').textContent = 'Độ tin cậy: ' + doTinCay;

            if (lastPred && data.phien && lastPred.phien == data.phien) {
                const exists = history.some(item => item.phien === data.phien);
                if (!exists) {
                    const isWin = (ketQua === lastPred.duDoan);
                    history.unshift({
                        phien: data.phien,
                        ketQua: ketQua,
                        duDoan: lastPred.duDoan,
                        isWin: isWin
                    });
                    if (history.length > 10) history.pop();
                    renderHistory();
                }
            }

            lastPred = { phien: data.phien_hien_tai, duDoan: duDoan };
        }

        function renderHistory() {
            const tbody = document.getElementById('historyBody');
            if(history.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="color:var(--ios-text-secondary); font-size:13px; padding:35px 0;">Đang chờ phiên xúc xắc tiếp theo...</td></tr>`;
                return;
            }
            tbody.innerHTML = history.map(item => `
                <tr>
                    <td style="color: var(--ios-text-secondary);">#${item.phien}</td>
                    <td style="color:${item.ketQua==='TÀI'?'var(--ios-green)':'var(--ios-red)'}">${item.ketQua}</td>
                    <td style="color:${item.duDoan==='TÀI'?'var(--ios-green)':'var(--ios-red)'}">${item.duDoan}</td>
                    <td class="${item.isWin ? 'status-win' : 'status-lose'}">${item.isWin ? '✅ HÚP' : '❌ TRƯỢT'}</td>
                </tr>
            `).join('');
        }

        function startLoop() {
            if (intervalId) clearInterval(intervalId);
            callAPI();
            intervalId = setInterval(callAPI, 4000); 
        }

        document.getElementById('menuBtn').addEventListener('click', e => {
            e.stopPropagation();
            const panel = document.getElementById('menuPanel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        });
        
        document.addEventListener('click', () => {
            document.getElementById('menuPanel').style.display = 'none';
        });

        function switchTable(table) {
            currentTable = table;
            document.getElementById('headerTitle').textContent = table === 'md5' ? 'HITCLUB MD5' : 'HITCLUB THƯỜNG';
            document.getElementById('menuPanel').style.display = 'none';
            
            history = [];
            lastPred = null;
            document.getElementById('phienText').textContent = '#-------';
            document.getElementById('duDoanText').textContent = '---';
            document.getElementById('duDoanText').style.color = 'var(--ios-text-primary)';
            document.getElementById('doTinCayText').textContent = '--%';
            document.getElementById('predCircle').className = 'prediction-circle';
            renderHistory();
            
            startLoop();
        }
</script>

</body>
</html>
