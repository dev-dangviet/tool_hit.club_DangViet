<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HITCLUB PREMIUM | DANG VIET</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #010103;
            --ios-surface: rgba(28, 28, 35, 0.45);
            --ios-surface-solid: #09090b;
            --ios-border: rgba(255, 255, 255, 0.06);
            --ios-accent: #0A84FF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-text-primary: #FFFFFF;
            --ios-text-secondary: rgba(255, 255, 255, 0.45);
            --ios-glow-green: rgba(48, 209, 88, 0.12);
            --ios-glow-red: rgba(255, 69, 58, 0.12);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--ios-bg);
            color: var(--ios-text-primary);
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -100px; left: -50px; width: 530px; height: 480px;
            background: radial-gradient(circle, rgba(10, 132, 255, 0.12) 0%, rgba(0,0,0,0) 80%);
            z-index: -1;
            pointer-events: none;
        }

        .icon-key {
            width: 46px; height: 46px; margin: 0 auto 20px;
            position: relative; background: radial-gradient(circle, rgba(10, 132, 255, 0.2), transparent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .icon-key::before {
            content: ''; width: 16px; height: 16px; border: 3.5px solid var(--ios-accent);
            border-radius: 50%; position: absolute; top: 10px;
        }
        .icon-key::after {
            content: ''; width: 4px; height: 16px; background: var(--ios-accent);
            position: absolute; bottom: 8px; box-shadow: 4px 4px 0 var(--ios-accent);
        }

        .icon-arrow-left {
            width: 10px; height: 10px; border-left: 2.5px solid var(--ios-accent);
            border-bottom: 2.5px solid var(--ios-accent); transform: rotate(45deg);
            display: inline-block; margin-right: 8px;
        }

        .icon-more {
            display: flex; gap: 3.5px; padding: 12px 6px; cursor: pointer;
        }
        .icon-more span {
            width: 5px; height: 5px; background: var(--ios-accent); border-radius: 50%;
        }

        .icon-dice {
            width: 16px; height: 16px; border: 2px solid #fff; border-radius: 4px;
            position: relative; display: inline-block; margin-right: 10px;
        }
        .icon-dice::before, .icon-dice::after {
            content: ''; position: absolute; width: 3px; height: 3px; background: #fff; border-radius: 50%;
        }
        .icon-dice::before { top: 2px; left: 2px; box-shadow: 7px 7px 0 #fff; }
        .icon-dice::after { top: 2px; right: 2px; box-shadow: -7px 7px 0 #fff; }

        .icon-diamond {
            width: 12px; height: 12px; border: 2px solid #fff;
            transform: rotate(45deg); display: inline-block; margin-right: 12px;
            position: relative; top: -1px;
        }

        .icon-logout {
            width: 14px; height: 14px; border: 2px solid var(--ios-red); border-right: none;
            position: relative; display: inline-block; margin-right: 12px;
        }
        .icon-logout::before {
            content: ''; position: absolute; right: -6px; top: 4px;
            width: 8px; height: 2px; background: var(--ios-red);
        }
        .icon-logout::after {
            content: ''; position: absolute; right: -6px; top: 1px;
            width: 5px; height: 5px; border-top: 2px solid var(--ios-red);
            border-right: 2px solid var(--ios-red); transform: rotate(45deg);
        }

        .icon-check {
            width: 11px; height: 6px; border-left: 2px solid var(--ios-green);
            border-bottom: 2px solid var(--ios-green); transform: rotate(-45deg);
            display: inline-block; margin-right: 6px; position: relative; top: -2px;
        }

        .icon-cross {
            width: 11px; height: 11px; position: relative; display: inline-block; margin-right: 6px; top: 1px;
        }
        .icon-cross::before, .icon-cross::after {
            content: ''; position: absolute; left: 4.5px; top: 0; width: 2px; height: 11px; background: var(--ios-red);
        }
        .icon-cross::before { transform: rotate(45deg); }
        .icon-cross::after { transform: rotate(-45deg); }
        
        #keyOverlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(1, 1, 3, 0.95);
            backdrop-filter: blur(45px);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.5s;
        }
        #keyOverlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .key-card {
            width: 100%; max-width: 340px;
            background: var(--ios-surface);
            border: 0.5px solid var(--ios-border);
            border-radius: 32px; padding: 40px 24px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .key-card h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
        .key-card p { font-size: 14px; color: var(--ios-text-secondary); margin-bottom: 32px; }
        
        .key-input {
            width: 100%; padding: 18px; border-radius: 16px;
            background: rgba(255, 255, 255, 0.04); 
            border: 0.5px solid rgba(255, 255, 255, 0.03);
            color: #fff; font-size: 17px; text-align: center; letter-spacing: 1px;
            outline: none; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .key-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--ios-accent);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.18);
        }
        
        .key-btn {
            margin-top: 24px; padding: 18px; border-radius: 16px;
            background: var(--ios-accent); color: #fff; font-weight: 600; font-size: 16px;
            border: none; width: 100%; cursor: pointer; transition: all 0.25s ease;
            box-shadow: 0 6px 16px rgba(10, 132, 255, 0.2);
        }
        .key-btn:active { transform: scale(0.96); opacity: 0.85; }
        .key-msg { margin-top: 18px; font-size: 13.5px; font-weight: 500; min-height: 20px;}
        .key-msg.error { color: var(--ios-red); }
        .key-msg.success { color: var(--ios-green); }

        .header {
            display: flex; align-items: center; padding: 22px 24px;
            background: rgba(2, 2, 5, 0.5);
            backdrop-filter: blur(30px);
            border-bottom: 0.5px solid var(--ios-border);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            color: var(--ios-accent); text-decoration: none;
            display: flex; align-items: center; font-size: 16px; font-weight: 500;
        }
        .title { font-size: 17px; font-weight: 600; text-align: center; flex: 1; letter-spacing: -0.3px; }
        .menu-btn { background: none; border: none; cursor: pointer; }

        .menu-panel {
            position: fixed; top: 78px; right: 24px; width: 195px;
            background: rgba(25, 25, 30, 0.97);
            backdrop-filter: blur(35px);
            border: 0.5px solid var(--ios-border);
            border-radius: 24px; padding: 6px 0;
            display: none; flex-direction: column; z-index: 200;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .menu-panel button {
            background: none; border: none; color: #fff; padding: 15px 18px;
            text-align: left; font-size: 15px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; width: 100%;
            border-bottom: 0.5px solid rgba(255,255,255,0.03);
        }
        .menu-panel button:last-child { border-bottom: none; color: var(--ios-red); }
        .menu-panel button:active { background: rgba(255,255,255,0.08); }

        .main-content {
            flex: 1; display: flex; flex-direction: column; align-items: center; padding: 36px 24px;
        }

        .prediction-circle {
            width: 236px; height: 236px; border-radius: 50%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 100%);
            border: 0.5px solid var(--ios-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 42px; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .prediction-circle.pulse-green { 
            border-color: rgba(48, 209, 88, 0.4); 
            box-shadow: 0 0 45px var(--ios-glow-green), inset 0 0 22px rgba(48, 209, 88, 0.05);
        }
        .prediction-circle.pulse-red { 
            border-color: rgba(255, 69, 58, 0.4); 
            box-shadow: 0 0 45px var(--ios-glow-red), inset 0 0 22px rgba(255, 69, 58, 0.05);
        }

        .session-text { font-size: 11px; font-weight: 600; color: var(--ios-text-secondary); letter-spacing: 2px; margin-bottom: 4px; }
        .prediction-result { font-size: 56px; font-weight: 800; letter-spacing: -1px; text-shadow: 0 4px 18px rgba(0,0,0,0.5); }
        .confidence-text { font-size: 15px; font-weight: 600; color: var(--ios-text-secondary); margin-top: 6px; }

        .history-section { width: 100%; margin-top: 14px; }
        .history-title { font-size: 13px; font-weight: 500; color: var(--ios-text-secondary); letter-spacing: 0.5px; margin-left: 12px; margin-bottom: 12px; text-transform: uppercase;}
        
        .history-container {
            background: var(--ios-surface); border: 0.5px solid var(--ios-border);
            border-radius: 24px; overflow: hidden; box-shadow: 0 12px 35px rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
        }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th {
            padding: 15px; text-align: center; font-size: 12px; color: var(--ios-text-secondary); font-weight: 600;
            border-bottom: 0.5px solid var(--ios-border); background: rgba(255, 255, 255, 0.01);
        }
        .history-table td { padding: 16px 15px; text-align: center; font-size: 14.5px; font-weight: 500; border-bottom: 0.5px solid rgba(255,255,255,0.03); }
        .history-table tr:last-child td { border-bottom: none; }
        
        .status-win { color: var(--ios-green); font-weight: 600; display: inline-flex; align-items: center; }
        .status-lose { color: var(--ios-red); font-weight: 600; display: inline-flex; align-items: center; }
    </style>
</head>
<body>

    <div id="keyOverlay">
        <div class="key-card">
            <div class="icon-key"></div>
            <h2>HITCLUB - PHANMEMTOOOL.FUN</h2>
            <p>VUI LÒNG NHẬP KEY ĐỂ KÍCH HOẠT TOOL</p>
            <input type="text" id="keyInput" class="key-input" placeholder="Nhập key vào đây..." maxlength="24" autocomplete="off">
            <button id="keyBtn" class="key-btn" onclick="submitKey()">KÍCH HOẠT TOOL</button>
            <div id="keyMsg" class="key-msg"></div>
        </div>
    </div>

    <header class="header">
        <a href="#" class="back-btn" onclick="location.reload()"><span class="icon-arrow-left"></span> Trở lại</a>
        <div class="title" id="headerTitle">HITCLUB MD5</div>
        <button class="menu-btn" id="menuBtn">
            <div class="icon-more"><span></span><span></span><span></span></div>
        </button>
    </header>

    <div class="menu-panel" id="menuPanel">
        <button onclick="switchTable('md5')"><span class="icon-dice"></span> Bàn MD5</button>
        <button onclick="switchTable('tx')"><span class="icon-diamond"></span> Bàn Thường</button>
        <button onclick="location.reload()"><span class="icon-logout"></span> Đăng xuất</button>
    </div>

    <div class="main-content" id="mainContent" style="display:none;">
        <div class="prediction-circle" id="predCircle">
            <div class="session-text">PHIÊN PHÂN TÍCH</div>
            <div style="font-size:15px; font-weight:700; color:var(--ios-accent); margin-bottom:2px;" id="phienText">#-------</div>
            <div class="prediction-result" id="duDoanText">---</div>
            <div class="confidence-text" id="doTinCayText">--%</div>
        </div>

        <div class="history-section">
            <div class="history-title">Lịch sử phân tích hệ thống</div>
            <div class="history-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Phiên</th>
                            <th>Kết Quả</th>
                            <th>Dự Đoán</th>
                            <th>Trạng Thái</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="4" style="color:var(--ios-text-secondary); font-size:13px; padding:35px 0;">Đang thiết lập luồng dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let toolActive = false; 
        let currentTable = 'md5'; 
        let historyList = []; 
        let lastPred = null; 
        let intervalId = null;
        let isFetching = false; 

        const MASTER_KEY = "HITCLUB_DANG_VIET";
        
        const API_URLS = {
            md5: 'https://hitclub-edyt.onrender.com/taixiumd5',
            tx: 'https://hitclub-edyt.onrender.com/taixiu'
        };

        function submitKey() {
            const input = document.getElementById('keyInput');
            const btn = document.getElementById('keyBtn');
            const msg = document.getElementById('keyMsg');
            const key = input.value.trim();

            if (key.length === 0) {
                msg.textContent = 'Vui lòng nhập mã bản quyền!'; 
                msg.className = 'key-msg error'; 
                return;
            }

            btn.disabled = true; 
            btn.textContent = 'Đang xác thực hệ thống...';
            msg.textContent = '';

            setTimeout(() => {
                if (key === MASTER_KEY) {
                    toolActive = true; 
                    msg.textContent = '✅ Thiết bị xác thực thành công! Đang chuyển hướng...'; 
                    msg.className = 'key-msg success';
                    
                    setTimeout(() => {
                        document.getElementById('keyOverlay').classList.add('hidden');
                        document.getElementById('mainContent').style.display = '';
                        startLoop(); 
                    }, 700);
                } else {
                    toolActive = false;
                    btn.disabled = false;
                    btn.textContent = 'Xác thực Thiết bị';
                    msg.textContent = '❌ key kích hoạt không chính xác. Vui lòng thử lại!'; 
                    msg.className = 'key-msg error';
                }
            }, 800);
        }

        document.getElementById('keyInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitKey();
        });

        async function callAPI() {
            if (!toolActive || isFetching) return; 
            
            isFetching = true;
            try {
                const targetUrl = API_URLS[currentTable];
                const antiCacheToken = '?nocache=' + new Date().getTime();
                
                const response = await fetch(targetUrl + antiCacheToken, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                
                if (data && data.phien_hien_tai) {
                    processEngineData(data);
                }
            } catch(e) {
                console.error('Đang kết nối lại mạng lõi API...', e);
            } finally {
                isFetching = false; 
            }
        }

        function processEngineData(data) {
            let duDoanRaw = (data.du_doan || '---').toUpperCase();
            let duDoan = (duDoanRaw === 'XIU' || duDoanRaw === 'XỈU') ? 'XỈU' : (duDoanRaw === 'TAI' || duDoanRaw === 'TÀI') ? 'TÀI' : '---'; 
            
            let ketQuaRaw = (data.ket_qua || '---').toUpperCase();
            let ketQua = (ketQuaRaw === 'XIU' || ketQuaRaw === 'XỈU') ? 'XỈU' : (ketQuaRaw === 'TAI' || ketQuaRaw === 'TÀI') ? 'TÀI' : '---';

            let doTinCay = currentTable === 'md5' ? (data.ty_le || '--%') : (data.confidence || '--%');

            document.getElementById('phienText').textContent = '#' + data.phien_hien_tai;
            document.getElementById('duDoanText').textContent = duDoan;
            
            const circle = document.getElementById('predCircle');
            if (duDoan === 'TÀI') {
                document.getElementById('duDoanText').style.color = 'var(--ios-green)';
                circle.className = 'prediction-circle pulse-green';
            } else if (duDoan === 'XỈU') {
                document.getElementById('duDoanText').style.color = 'var(--ios-red)';
                circle.className = 'prediction-circle pulse-red';
            } else {
                document.getElementById('duDoanText').style.color = 'var(--ios-text-primary)';
                circle.className = 'prediction-circle';
            }
            
            document.getElementById('doTinCayText').textContent = 'Độ tin cậy: ' + doTinCay;

            let phienXetDuyet = data.phien || data.last_phien;
            
            if (lastPred && phienXetDuyet && parseInt(lastPred.phien) === parseInt(phienXetDuyet) && ketQua !== '---') {
                const isDuplicated = historyList.some(item => parseInt(item.phien) === parseInt(phienXetDuyet));
                if (!isDuplicated) {
                    const isWin = (ketQua === lastPred.duDoan);
                    historyList.unshift({
                        phien: phienXetDuyet,
                        ketQua: ketQua,
                        duDoan: lastPred.duDoan,
                        isWin: isWin
                    });
                    if (historyList.length > 10) historyList.pop();
                    renderHistory();
                }
            }

            lastPred = { phien: data.phien_hien_tai, duDoan: duDoan };
        }

        function renderHistory() {
            const tbody = document.getElementById('historyBody');
            if (historyList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="color:var(--ios-text-secondary); font-size:13px; padding:35px 0;">Đang chờ dữ liệu phiên tiếp theo...</td></tr>`;
                return;
            }
            tbody.innerHTML = historyList.map(item => `
                <tr>
                    <td style="color: var(--ios-text-secondary);">#${item.phien}</td>
                    <td style="color:${item.ketQua === 'TÀI' ? 'var(--ios-green)' : 'var(--ios-red)'}">${item.ketQua}</td>
                    <td style="color:${item.duDoan === 'TÀI' ? 'var(--ios-green)' : 'var(--ios-red)'}">${item.duDoan}</td>
                    <td>
                        <span class="${item.isWin ? 'status-win' : 'status-lose'}">
                            <span class="${item.isWin ? 'icon-check' : 'icon-cross'}"></span>
                            ${item.isWin ? 'HÚP' : 'GÃY'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function startLoop() {
            if (intervalId) clearInterval(intervalId);
            callAPI();
            intervalId = setInterval(callAPI, 2000);
        }

        document.getElementById('menuBtn').addEventListener('click', e => {
            e.stopPropagation();
            const panel = document.getElementById('menuPanel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        });
        
        document.addEventListener('click', () => {
            document.getElementById('menuPanel').style.display = 'none';
        });

        function switchTable(table) {
            currentTable = table;
            document.getElementById('headerTitle').textContent = table === 'md5' ? 'HITCLUB MD5' : 'HITCLUB THƯỜNG';
            document.getElementById('menuPanel').style.display = 'none';
            
            historyList = [];
            lastPred = null;
            document.getElementById('phienText').textContent = '#-------';
            document.getElementById('duDoanText').textContent = '---';
            document.getElementById('duDoanText').style.color = 'var(--ios-text-primary)';
            document.getElementById('doTinCayText').textContent = '--%';
            document.getElementById('predCircle').className = 'prediction-circle';
            renderHistory();
            
            startLoop();
        }
    </script>
</body>
</html>
